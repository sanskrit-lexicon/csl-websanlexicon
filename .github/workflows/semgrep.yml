name: Semgrep

# CodeQL has no PHP analyzer, so the ~800-file PHP web-frontend gets no SAST
# from it. Semgrep DOES support PHP: this fills that gap. It scans PHP (and
# Python) with the community security rulesets.
#
# Two jobs:
# - `semgrep` (SAST) uploads full-repo SARIF to the Security tab. Advisory —
#   never fails the check, mirrors the CodeQL workflow.
# - `semgrep-ci-gate` runs `semgrep ci`, which is diff-aware on pull_request
#   events: it fails only on findings introduced by the PR relative to the
#   merge-base, so the clean main baseline (Wave 1, PR #76) is grandfathered
#   without a separate baseline file. This job is allowed to fail the check
#   (Wave 2, D3 in docs/ROADMAP_2026_2027.md).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    # The semgrep container ships its own Python; skip on Dependabot (no token).
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/php \
            --config p/security-audit \
            --exclude v00 \
            --sarif --output semgrep.sarif \
            --metrics off || true

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  semgrep-ci-gate:
    name: Semgrep CI gate (new findings)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: semgrep ci (diff-aware, blocks on new findings only)
        run: |
          semgrep ci \
            --config p/php \
            --config p/security-audit \
            --exclude v00 \
            --metrics off
